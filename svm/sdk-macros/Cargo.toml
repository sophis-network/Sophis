[package]
name = "sophis-sdk-macros"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Proc-macro support for sophis-sdk"

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1.0"
quote = "1.0"
syn = { version = "2.0", features = ["full", "visit"] }

[dev-dependencies]
trybuild = { version = "1.0", features = ["diff"] }
sophis-sdk = { version = "1.1.0", path = "../sdk" }

[lints]
workspace = true
