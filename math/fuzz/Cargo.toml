[package]
name = "math-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
num-bigint = "0.4"
num-traits = "0.2"
num-integer = "0.1"

# Audit/F-15 (Session 14, 2026-05-16): the definitive fix. The
# `construct_uint!` macro's js-sys / wasm-bindgen surface (`as_bigint`,
# `to_bigint`, the three `TryFrom<&_/_/JsValue>` impls) is now gated
# behind `#[cfg(target_arch = "wasm32")]` in `sophis-math::uint`. On the
# x86_64 fuzz target those blocks are not emitted, so the macro
# expansion no longer references wasm-bindgen / js-sys / serde-wasm-
# bindgen / workflow-*. Only the non-wasm expansion deps remain below.
# (Replaces the 2026-05-14 partial workaround that listed all ~11
# transitive crates.)
borsh = { version = "1.5", features = ["derive"] }
faster-hex = "0.9"
malachite-base = "0.4.4"
malachite-nz = "0.4.4"
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
sophis-utils = { path = "../../utils" }

[dependencies.sophis-math]
path = ".."

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "u128"
path = "fuzz_targets/u128.rs"
test = false
doc = false

[[bin]]
name = "u256"
path = "fuzz_targets/u256.rs"
test = false
doc = false

[[bin]]
name = "u192"
path = "fuzz_targets/u192.rs"
test = false
doc = false
