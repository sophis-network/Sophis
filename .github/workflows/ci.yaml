name: Tests

on:
  push:
    branches: [main, master, 'phase*']
    paths-ignore:
      - '**.md'
      - 'whitepaper/**'
      - 'deploy/**'
      - 'devnet/**'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'whitepaper/**'
      - 'deploy/**'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:
  schedule:
    # 0 0 * * 5 = Meia-noite de Sexta-feira (UTC)
    - cron: '0 0 * * 5'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache risc0 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.risc0
          key: ${{ runner.os }}-risc0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-risc0-

      - name: Install risc0 toolchain via rzup
        # risc0-build >= 3.0 invokes rzup during the `sophis-rollup-host`
        # build script, which runs even on `cargo check`. Without rzup the
        # build script panics.
        run: |
          curl -fsSL https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH
          $HOME/.risc0/bin/rzup install rust
          $HOME/.risc0/bin/rzup install cpp
          $HOME/.risc0/bin/rzup install risc0-groth16

      - name: Set up cache
        uses: Swatinem/rust-cache@v2

      - name: Run cargo check
        run: cargo check --tests --workspace --benches

  test:
    name: Test Suite
    # runs-on: ${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # matrix:
      #   os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      # Clean unnecessary files to save disk space
      - name: clean unnecessary files to save space
        run: |
          if [ "$(docker images -q)" ]; then
            docker rmi $(docker images -q)
          fi
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/sudo apt/sources.list.d
          sudo apt -y autoremove --purge
          sudo apt -y autoclean
          sudo apt clean
          rm --recursive --force "$AGENT_TOOLSDIRECTORY"
          df -h          

          # remove large packages manually (all but llvm)
          sudo apt-get remove -y '^aspnetcore-.*' || echo "::warning::The command [sudo apt-get remove -y '^aspnetcore-.*'] failed to complete successfully. Proceeding..."
          sudo apt-get remove -y '^dotnet-.*' --fix-missing || echo "::warning::The command [sudo apt-get remove -y '^dotnet-.*' --fix-missing] failed to complete successfully. Proceeding..."
          sudo apt-get remove -y 'php.*' --fix-missing || echo "::warning::The command [sudo apt-get remove -y 'php.*' --fix-missing] failed to complete successfully. Proceeding..."
          sudo apt-get remove -y '^mongodb-.*' --fix-missing || echo "::warning::The command [sudo apt-get remove -y '^mongodb-.*' --fix-missing] failed to complete successfully. Proceeding..."
          sudo apt-get remove -y '^mysql-.*' --fix-missing || echo "::warning::The command [sudo apt-get remove -y '^mysql-.*' --fix-missing] failed to complete successfully. Proceeding..."
          sudo apt-get remove -y azure-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri --fix-missing || echo "::warning::The command [sudo apt-get remove -y azure-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri --fix-missing] failed to complete successfully. Proceeding..."
          sudo apt-get remove -y google-cloud-sdk --fix-missing || echo "::debug::The command [sudo apt-get remove -y google-cloud-sdk --fix-missing] failed to complete successfully. Proceeding..."
          sudo apt-get remove -y google-cloud-cli --fix-missing || echo "::debug::The command [sudo apt-get remove -y google-cloud-cli --fix-missing] failed to complete successfully. Proceeding..."
          sudo apt-get autoremove -y || echo "::warning::The command [sudo apt-get autoremove -y] failed to complete successfully. Proceeding..."
          sudo apt-get clean || echo "::warning::The command [sudo apt-get clean] failed to complete successfully. Proceeding..."
          df -h          

      # Free up disk space on Ubuntu
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # This might remove tools that are actually needed, if set to "true" but frees about 6 GB
          tool-cache: false

          # large packages, except llvm, are removed manually during the previous step
          # see: https://github.com/jlumbroso/free-disk-space/issues/6
          # TODO: use the discussed whitelist feature when available
          large-packages: false

          swap-storage: true

      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Fix CRLF on Windows
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache risc0 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.risc0
          key: ${{ runner.os }}-risc0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-risc0-

      - name: Install risc0 toolchain via rzup
        # See `check` job above — required even for `cargo build`/`cargo test`
        # of the workspace because risc0-build runs from sophis-rollup-host's
        # build script.
        run: |
          curl -fsSL https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH
          $HOME/.risc0/bin/rzup install rust
          $HOME/.risc0/bin/rzup install cpp
          $HOME/.risc0/bin/rzup install risc0-groth16

      - name: Set up cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run cargo build with devnet-prealloc feature
        run: cargo build --features devnet-prealloc --workspace --all --tests --benches
        env:
          RISC0_DEV_MODE: "1"

      - name: Run cargo test regular features
        run: cargo nextest run --workspace
        env:
          RISC0_DEV_MODE: "1"

      # The sophis-svm-host risc0 verifier path is exercised in the
      # dedicated test-svm-zk job below. Keeping it inside this `test`
      # job in addition to `cargo nextest run --workspace` exceeded the
      # GitHub runner's 14GB free-disk budget once `target/` had been
      # populated by the previous step.

      # Doc tests + workspace cargo doc removed: exceed the GitHub runner
      # disk/time budget after the Phase 3 ZK-Rollup + Phase 4 Bridge crates
      # were added. TODO: re-enable once split into a dedicated job or scoped
      # to crates that ship public APIs (sophis-core, sophis-consensus-core,
      # sophis-addresses, sophis-rpc-core).

  # ── sVM host risc0 verifier path ──────────────────────────────────────
  # Validates `cargo test -p sophis-svm-host --features risc0`, which
  # exercises the consensus-critical risc0 STARK verifier used by Phase 3
  # ZK-Rollup state-update contracts (see sophis-svm-host/src/lib.rs
  # "Caminho 2" rationale). Split into its own job: compiling risc0-
  # circuit-*-sys + librocksdb-sys on top of an already-bloated `target/`
  # (after `cargo nextest run --workspace`) exceeds GitHub's ~14GB free
  # disk budget. Isolated runner = fresh disk + parallel wallclock.
  test-svm-zk:
    name: Test Suite (svm-zk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache risc0 toolchain
        uses: actions/cache@v4
        with:
          path: ~/.risc0
          key: ${{ runner.os }}-risc0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-risc0-

      - name: Install risc0 toolchain via rzup
        run: |
          curl -fsSL https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH
          $HOME/.risc0/bin/rzup install rust
          $HOME/.risc0/bin/rzup install cpp
          $HOME/.risc0/bin/rzup install risc0-groth16

      - name: Set up cache
        uses: Swatinem/rust-cache@v2
        with:
          # Distinct cache key from the main `test` job — build graph is
          # different (single package + risc0 feature gate, not full
          # workspace), so a shared cache would cause unnecessary
          # invalidations.
          key: svm-zk

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run cargo test of sophis-svm-host with svm-zk feature
        run: cargo nextest run -p sophis-svm-host --features risc0
        env:
          RISC0_DEV_MODE: "1"

      # kip-10 example removed: it uses OpCheckSig (Schnorr), which is
      # disabled in Sophis (Dilithium-only chain per CLAUDE.md). TODO:
      # rewrite as a Dilithium ML-DSA-44 timelock example, or move to
      # the obsolete-examples archive.


